<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-sacel=1" />
    <title>TaNaMesa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-page">
        <div class="login-logo">TaNaMesa</div>
        <button type="button" class="mesa-card">
            <span class="mesa-label">Mesa</span>
            <span class="mesa-numero">3</span>
        </button>
        <div class="input">
            <input type="text" id="telefone" placeholder="(xx) xxxxx-xxxx">
        </div>
        <div class="input">
            <input type="text" id="name" placeholder="Nome">
        </div>
        <button type="submit" class="btn-logar">Entrar</button>
        <div class="ajuda-login">
            <p class="need-help">Precisa de ajuda?</p>
            <button type="button" class="help">Chame um atendente</button>
        </div>
    </main>
</body>
</html>
